<!DOCTYPE html>
<html lang="de"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Kundenverwaltung</title>
    <h:outputStylesheet library="css" name="style.css"/>
</h:head>

<h:body>
    <p:messages id="messages" showDetail="true" closable="true"/>

    <header>
        <h1>Kundenverwaltung</h1>
        <nav>
            <h:link value="Start" outcome="/index.xhtml"/>

            <h:panelGroup rendered="#{authController.loggedIn}">
                |
                <h:link value="Kundenliste" outcome="/customers.xhtml"/>

                <h:panelGroup rendered="#{authController.admin}">
                    |
                    <h:link value="Benutzerverwaltung" outcome="/admin/users.xhtml"/>
                </h:panelGroup>

                |
                <h:outputText value="Hallo, #{authController.currentUser.username}!"/>
                <h:form id="logoutForm" styleClass="nav-inline-form">
                    <h:commandButton value="Logout"
                                     action="#{authController.logout}"
                                     styleClass="nav-menu-button"/>
                </h:form>
            </h:panelGroup>

            <h:panelGroup rendered="#{not authController.loggedIn}">
                |
                <h:link value="Login"        outcome="/login.xhtml"/>
                |
                <h:link value="Registrieren" outcome="/register.xhtml"/>
            </h:panelGroup>
        </nav>
    </header>

    <main>
        <ui:insert name="content"/>
    </main>

    <footer>
        <p>DSBPIIJEE01 – Programmierung industrieller Informationssysteme mit Java EE – SoSe 2026</p>
    </footer>

</h:body>
</html>
