<!DOCTYPE html>
<html lang="de"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html">

<ui:composition template="WEB-INF/templates/layout.xhtml">
    <ui:define name="content">
        <h2>Willkommen im Kundenverwaltungssystem</h2>
        <p>Verwalten Sie Ihre Kundenstammdaten und Projekte zentral an einem Ort.</p>

        <h:panelGroup rendered="#{not authController.loggedIn}">
            <div class="info-box">
                <p>Bitte melden Sie sich an, um das System zu nutzen.</p>
                <h:button value="Zum Login" outcome="/login.xhtml"/>
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{authController.loggedIn}">
            <div class="info-box">
                <p class="success">Sie sind angemeldet als: #{authController.currentUser.username}</p>
                <h:button value="Zur Kundenliste" outcome="/customers.xhtml"/>
            </div>
        </h:panelGroup>
    </ui:define>
</ui:composition>
</html>
